spring.application.name=barbearia-api
# 1. Configuração de conexão com o banco
spring.datasource.url=jdbc:mysql://localhost:3306/barbershop_db?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root

# 2. Configurações do Hibernate (Cria as tabelas automaticamente)
spring.jpa.hibernate.ddl-auto=update

# 3. Mostra os comandos SQL no console (Ótimo para debugar)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true